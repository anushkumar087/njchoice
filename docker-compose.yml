services:
  # Comprehensive Smoke Tests (Default)
  njchoice-smoke:
    build: .
    stdin_open: true 
    tty: true  
    environment:
      - TESTNG_SUITE_XML=src/test/resources/testng_comprehensive_smoke.xml
      - IS_DOCKER_RUNTIME=true
    volumes:
      - ./reports:/app/reports
      - ./target/surefire-reports:/app/target/surefire-reports
    shm_size: '2gb'
    mem_limit: 4g
    mem_reservation: 2g

  # Comprehensive Full Tests
  njchoice-comprehensive:
    build: .
    stdin_open: true 
    tty: true  
    environment:
      - TESTNG_SUITE_XML=src/test/resources/testng_comprehensive.xml
      - IS_DOCKER_RUNTIME=true
    volumes:
      - ./reports:/app/reports
      - ./target/surefire-reports:/app/target/surefire-reports
