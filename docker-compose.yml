    stdin_open: true
    tty: true  
    environment:
      - TESTNG_SUITE_XML=src/test/resources/testng_specific.xml
      - IS_DOCKER_RUNTIME=true
    volumes:
      - ./reports:/app/reports
      - ./target/surefire-reports:/app/target/surefire-reports
    shm_size: '2gb'
    mem_limit: 4g
    mem_reservation: 2g

  # Basic TestNG
  njchoice-basic:
    build: .
    stdin_open: true
    tty: true  
    environment:
      - TESTNG_SUITE_XML=src/test/resources/testng.xml
      - IS_DOCKER_RUNTIME=true
    volumes:
      - ./reports:/app/reports
      - ./target/surefire-reports:/app/target/surefire-reports
    shm_size: '2gb'
    mem_limit: 4g
    mem_reservation: 2g

  # Generic/Custom - specify XML file via environment variable at runtime
  njchoice-custom:
    build: .
    stdin_open: true
    tty: true
    environment:
      - TESTNG_SUITE_XML=${TESTNG_SUITE_XML:-src/test/resources/testng_comprehensive_smoke.xml}
      - IS_DOCKER_RUNTIME=true
    volumes:
      - ./reports:/app/reports
      - ./target/surefire-reports:/app/target/surefire-reports
    shm_size: '2gb'
    mem_limit: 6g
    mem_reservation: 3g
